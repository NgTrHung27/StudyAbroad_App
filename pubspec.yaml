name: study_abroad_cemc_mobile
description: Study Abroad - CECM LTD.CO
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.4
  intl: ^0.19.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.2
  shared_preferences_platform_interface: ^2.3.2
  bcrypt: ^1.1.3
  http: ^1.2.1
  google_fonts: ^8.1.0
  fluttertoast: ^9.0.0
  image_picker: ^1.0.7
  bloc: ^9.0.0  
  flutter_bloc: ^9.1.0          # BLoC state management
  hydrated_bloc: ^11.0.0         # Persistent BLoC
  equatable: ^2.0.7              # Value equality
  get_it: ^9.0.5                # Dependency injection
  
  # Networking
  dio: ^5.8.0+1                 # HTTP client
  internet_connection_checker: ^3.0.1
  
  # Functional Programming
  fpdart: ^1.2.0                # Functional programming (Either)
  
  # Logging
  logger: ^2.6.2                 # Logging
  carousel_slider_plus: ^7.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  flutter_html: ^3.0.0
  rflutter_alert: ^2.0.7
  provider: ^6.1.2
  floating_chat_button: ^1.0.1
  google_generative_ai: ^0.4.3
  flutter_markdown: ^0.7.3
  url_launcher: ^6.3.0
  dash_chat_2: ^0.0.21
  web_socket_channel: ^3.0.0
  firebase_core: ^4.8.0
  connectivity_plus: ^6.1.5
  firebase_messaging: ^16.2.1
  firebase_analytics: ^12.4.0
  flutter_local_notifications: ^20.1.0
  easy_stepper: ^1.0.1
  casa_vertical_stepper: ^0.0.5
  gif: ^2.3.0
  smooth_page_indicator:
  permission_handler: ^12.0.0+1
  showcaseview: ^5.0.2
  pdf: ^3.11.1
  open_file: ^3.3.2
  path_provider: ^2.1.4
  ably_flutter: ^1.2.36
  flutter_speed_dial: ^7.0.0
  meta: ^1.16.0

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo_red.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/logo/logo_red.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/logo/logo_red.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/logo/logo_red.png"

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^2.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/
    - assets/backgrounds/
    - assets/countries/
    - assets/icons_3d/
    - assets/logo/
    - assets/fonts/
    - assets/l10n/
    - assets/knowledge/
    - env.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
